kind = "web"
previewPath = "/"
title = "Question Bank"
version = "1.0.0"
id = "artifacts/question-bank"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22248

[services.development]
run = "pnpm --filter @workspace/question-bank run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/question-bank", "run", "build" ]
publicDir = "artifacts/question-bank/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22248"
BASE_PATH = "/"
